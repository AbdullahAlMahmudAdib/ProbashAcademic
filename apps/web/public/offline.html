<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProbashAcademic — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px 24px;
      background: linear-gradient(135deg, #f8f6f2 0%, #eef2ff 100%);
      font-family: "Segoe UI", system-ui, sans-serif;
      text-align: center;
      color: #1f2937;
    }
    .icon {
      width: 64px; height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-top: 8px; }
    p { font-size: 15px; color: #6b7280; max-width: 360px; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 28px;
      background: #6366f1;
      color: #fff;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    a:hover { background: #4f46e5; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>
    Check your internet connection and try again. Your bookmarks and profile
    are saved and will sync when you're back online.
  </p>
  <a href="/">Try again</a>
</body>
</html>
